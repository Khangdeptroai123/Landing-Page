services:
  - type: static
    name: landing-page
    env: static
    buildCommand: npm run build
    staticPublishPath: .
    routes:
      # Redirect .html URLs to clean URLs
      - type: redirect
        source: /Products.html
        destination: /Products

      - type: redirect
        source: /Mangrove-Charcoal.html
        destination: /Mangrove-Charcoal

      - type: redirect
        source: /Mangrove-Briquettes.html
        destination: /Mangrove-Briquettes

      - type: redirect
        source: /Coconut-Charcoal.html
        destination: /Coconut-Charcoal

      - type: redirect
        source: /Coconut-Briquettes.html
        destination: /Coconut-Briquettes

      - type: redirect
        source: /Coffee-Charcoal.html
        destination: /Coffee-Charcoal

      - type: redirect
        source: /Eucalyptus-Charcoal.html
        destination: /Eucalyptus-Charcoal

      - type: redirect
        source: /Kaya-Charcoal.html
        destination: /Kaya-Charcoal

      - type: redirect
        source: /Longan-Charcoal.html
        destination: /Longan-Charcoal

      # Rewrite clean URLs to actual HTML files
      - type: rewrite
        source: /Products
        destination: /Products.html

      - type: rewrite
        source: /Mangrove-Charcoal
        destination: /Mangrove-Charcoal.html

      - type: rewrite
        source: /Mangrove-Briquettes
        destination: /Mangrove-Briquettes.html

      - type: rewrite
        source: /Coconut-Charcoal
        destination: /Coconut-Charcoal.html

      - type: rewrite
        source: /Coconut-Briquettes
        destination: /Coconut-Briquettes.html

      - type: rewrite
        source: /Coffee-Charcoal
        destination: /Coffee-Charcoal.html

      - type: rewrite
        source: /Eucalyptus-Charcoal
        destination: /Eucalyptus-Charcoal.html

      - type: rewrite
        source: /Kaya-Charcoal
        destination: /Kaya-Charcoal.html

      - type: rewrite
        source: /Longan-Charcoal
        destination: /Longan-Charcoal.html